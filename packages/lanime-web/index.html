<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Re:제로부터 시작하는 이세계 메인</title>
    <meta name="description" content="애니메이션 스트리밍 서비스 라애니 — 최신 애니메이션을 감상하고, 랭킹·에피소드·리뷰를 한눈에 확인하세요." />

    <!-- Critical CSS: JS 번들 로드 전 레이아웃/테마 플래시 방지 -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      li, ol { margin: 0; padding: 0; }
      body {
        font-family: Roboto, 'Segoe UI', Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        user-select: none;
        /* Light theme CSS variables (default) */
        --bg-page1: #fafaf9; --bg-page2: #f5f5f4;
        --bg-element1: #FFFFFF; --bg-element2: #FDFBF6;
        --bg-element3: #e7e5e4; --bg-element4: #f5f5f4;
        --bg-element5: #FFFFFF; --bg-element6: #FBFDFC;
        --text1: #1A1A1A; --text2: #222222; --text3: #3B3B3B; --text4: #595959;
        --border1: #2C2C2C; --border2: #ADB5BD;
        --primary1: #b473f9; --primary2: #d2a9ff;
        --success1: #3399FF; --success-hover: #66B2FF; --success-disabled: #A0CFFF;
        --destructive1: #FF6B6B; --destructive-hover: #FF8787; --destructive-disabled: #FFB3B3;
        --disabled: #CED4DA; --button-text: #1A1A1A;
        --black: #1A1A1A; --white: #FAFAF8;
        --gray1: #F5F5F5; --gray2: #E0E0E0; --gray3: #BDBDBD; --gray4: #8C8C8C; --gray5: #595959;
        background-color: var(--bg-page1);
      }
      @media (prefers-color-scheme: dark) {
        body {
          --bg-page1: #1A1A1A; --bg-page2: #222222;
          --bg-element1: #1E1E1E; --bg-element2: #252525;
          --bg-element3: #2E2E2E; --bg-element4: #222222;
          --bg-element5: #252525; --bg-element6: #0c0c0c;
          --text1: #FAFAF8; --text2: #ECEAE4; --text3: #ACACAC; --text4: #848484;
          --border1: #2C2C2C; --border2: #4D4D4D;
          --disabled: #595959; --button-text: #FAFAF8;
          background-color: var(--bg-page1);
        }
      }
      body[data-theme='light'] {
        --bg-page1: #fafaf9; --bg-page2: #f5f5f4;
        --bg-element1: #FFFFFF; --bg-element2: #FDFBF6;
        --bg-element3: #e7e5e4; --bg-element4: #f5f5f4;
        --bg-element5: #FFFFFF; --bg-element6: #FBFDFC;
        --text1: #1A1A1A; --text2: #222222; --text3: #3B3B3B; --text4: #595959;
        --border1: #2C2C2C; --border2: #ADB5BD;
        --disabled: #CED4DA; --button-text: #1A1A1A;
        background-color: var(--bg-page1);
      }
      body[data-theme='dark'] {
        --bg-page1: #1A1A1A; --bg-page2: #222222;
        --bg-element1: #1E1E1E; --bg-element2: #252525;
        --bg-element3: #2E2E2E; --bg-element4: #222222;
        --bg-element5: #252525; --bg-element6: #0c0c0c;
        --text1: #FAFAF8; --text2: #ECEAE4; --text3: #ACACAC; --text4: #848484;
        --border1: #2C2C2C; --border2: #4D4D4D;
        --disabled: #595959; --button-text: #FAFAF8;
        background-color: var(--bg-page1);
      }
    </style>

    <!-- Google Fonts: rel="preload" + onload으로 렌더링 차단 제거 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet" />
    </noscript>
    <!--app-head-->
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.body.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/server/entry-client.jsx"></script>
  </body>
</html>
